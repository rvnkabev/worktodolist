<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Work ToDoList Planner</title>

<style>
body{
background:#0b1020;
color:white;
font-family:sans-serif;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.todo-card{
background:#111936;
border:1px solid #263565;
padding:12px;
border-radius:10px;
margin-bottom:10px;
display:flex;
gap:10px;
align-items:center;
}

button{
padding:6px 10px;
cursor:pointer;
}

input,select{
padding:8px;
margin-right:10px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Work Planner</h1>

<h2>新增任務</h2>

<input id="planNewTodo" placeholder="Task">
<select id="planNewPriority">
<option>P1</option>
<option selected>P2</option>
<option>P3</option>
</select>

<button onclick="addPlanTodoFromInput()">新增 Card</button>

<h2>Plan Cards</h2>

<div id="planTodoCards"></div>

</div>

<script>

const STORAGE_KEYS = {
planCards:"workPlanner_planCards_v1"
}

function uid(){
return "id_"+Math.random().toString(36).slice(2,9)
}

function loadLS(key){
return JSON.parse(localStorage.getItem(key)||"[]")
}

function saveLS(key,val){
localStorage.setItem(key,JSON.stringify(val))
}

function getPlanCards(){
return loadLS(STORAGE_KEYS.planCards)
}

function setPlanCards(arr){
saveLS(STORAGE_KEYS.planCards,arr)
}

function renderPlanCards(){

const list=getPlanCards()

const box=document.getElementById("planTodoCards")

box.innerHTML=""

list.forEach(item=>{

const div=document.createElement("div")

div.className="todo-card"

div.innerHTML=`
<input type="checkbox">

<div style="flex:1">
${item.text}
</div>

<button onclick="deletePlanCard('${item.id}')">Delete</button>
`

box.appendChild(div)

})

}

function addPlanTodoFromInput(){

const text=document.getElementById("planNewTodo").value.trim()

if(!text){
alert("請輸入任務")
return
}

const priority=document.getElementById("planNewPriority").value

const list=getPlanCards()

list.push({
id:uid(),
text,
priority
})

setPlanCards(list)

document.getElementById("planNewTodo").value=""

renderPlanCards()

}

function deletePlanCard(id){

let list=getPlanCards()

list=list.filter(x=>x.id!==id)

setPlanCards(list)

renderPlanCards()

}

renderPlanCards()

</script>

</body>
</html>
